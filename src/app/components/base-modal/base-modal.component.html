@if (show()) {
  <div
    class="pointer-events-auto fixed inset-0 z-[9999] isolate flex items-center justify-center antialiased"
    role="dialog"
    aria-modal="true"
    aria-labelledby="base-modal-title"
  >
    <button
      type="button"
      class="absolute inset-0 z-0 cursor-default border-0 bg-stone-800/50 p-0 dark:bg-black/70"
      @modalBackdropFade
      aria-label="Cerrar diálogo"
      (click)="onBackdropClick()"
    ></button>

    <div
      class="pointer-events-none relative z-10 flex min-h-screen w-full items-center justify-center p-4"
    >
      <div
        class="pointer-events-auto relative z-10 flex max-h-[calc(100vh-2rem)] w-full flex-col overflow-hidden rounded-xl bg-white shadow-xl dark:bg-slate-800 dark:shadow-slate-950/50"
        @modalPanelSpring
        [ngClass]="maxWidthMap[maxWidth()]"
      >
        <header
          class="flex flex-shrink-0 items-center justify-between border-b border-slate-200 bg-brand px-4 py-4 sm:px-6 dark:border-slate-600 dark:bg-brand-dark"
        >
          <h2 id="base-modal-title" class="pr-2 text-lg font-semibold text-white sm:text-xl">
            {{ title() }}
          </h2>
          @if (!hideCloseButton()) {
            <button
              type="button"
              class="rounded p-1 text-white transition-colors hover:bg-white/10"
              (click)="closed.emit()"
              aria-label="Cerrar"
            >
              <svg
                class="h-5 w-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          }
        </header>

        <div class="min-h-0 flex-1 overflow-y-auto p-4 sm:p-6">
          <ng-content />
        </div>

        @if (!hideFooter()) {
          <footer
            class="flex flex-shrink-0 flex-wrap items-center justify-end gap-3 border-t border-slate-200 p-4 sm:p-6 dark:border-slate-600"
          >
            @if (useDefaultFooter()) {
              <button
                type="button"
                class="rounded-md border border-slate-300 px-4 py-2 text-slate-600 transition-colors hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-500 dark:text-slate-200 dark:hover:bg-slate-700"
                [disabled]="loading()"
                (click)="closed.emit()"
              >
                {{ cancelText() }}
              </button>
              <button
                type="button"
                class="rounded-md bg-brand px-6 py-2 font-medium text-white transition-colors hover:bg-brand-dark disabled:cursor-not-allowed disabled:opacity-50"
                [disabled]="loading()"
                (click)="onConfirmClick()"
              >
                {{ loading() ? processingLabel() : confirmText() }}
              </button>
            } @else {
              <ng-content select="[modalFooter]" />
            }
          </footer>
        }
      </div>
    </div>
  </div>
}
