<header
  class="sticky top-0 z-40 border-b border-teal-700/30 bg-brand shadow dark:border-teal-900/50 dark:bg-brand-dark"
>
  <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3 sm:px-6">
    <div class="min-w-0 shrink-0">
      <div
        class="rounded-lg bg-slate-950/40 p-1 ring-1 ring-white/35 shadow-md backdrop-blur-[1px] dark:bg-black/45 dark:ring-white/25"
      >
        <img
          src="/images/rick-morty-logo.svg"
          alt="Rick and Morty"
          width="180"
          height="55"
          class="block h-8 w-auto max-w-[min(52vw,14rem)] object-contain brightness-110 contrast-110 drop-shadow-[0_1px_3px_rgba(0,0,0,0.75)] sm:h-10 sm:max-w-[16rem]"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
      </div>
    </div>
    <button
      type="button"
      class="inline-flex shrink-0 items-center justify-center rounded-lg border border-white/25 bg-white/10 p-2 text-white transition-colors hover:bg-white/20 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/60"
      [attr.aria-label]="isDark() ? 'Activar modo claro' : 'Activar modo oscuro'"
      (click)="onToggleTheme()"
    >
      @if (isDark()) {
        <svg
          class="h-5 w-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
          />
        </svg>
      } @else {
        <svg
          class="h-5 w-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
          />
        </svg>
      }
    </button>
  </div>
</header>

<main class="min-h-[calc(100vh-3.5rem)] min-w-0 bg-slate-50 px-4 py-6 sm:px-6 dark:bg-slate-900">
  <router-outlet />
</main>
